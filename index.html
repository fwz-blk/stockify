<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stockify – Kirana Shop Platform</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
    <!-- Supabase library -->
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap");

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg-primary: #0a0a0f;
        --bg-secondary: #111118;
        --bg-card: #16161f;
        --bg-card-hover: #1e1e2a;
        --bg-input: #1a1a24;
        --border: #2a2a3a;
        --border-light: #333345;
        --accent: #6c63ff;
        --accent-hover: #7c74ff;
        --accent-glow: rgba(108, 99, 255, 0.3);
        --accent2: #ff6584;
        --accent3: #43d9ad;
        --accent4: #ffb347;
        --text-primary: #f0f0ff;
        --text-secondary: #9090b0;
        --text-muted: #5a5a7a;
        --success: #43d9ad;
        --warning: #ffb347;
        --danger: #ff6584;
        --danger-glow: rgba(255, 101, 132, 0.25);
      }

      html,
      body {
        height: 100%;
        font-family: "Inter", sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
      }
      #root {
        min-height: 100vh;
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-secondary);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-light);
        border-radius: 3px;
      }

      /* Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(-20px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes glow {
        0%,
        100% {
          box-shadow: 0 0 20px var(--accent-glow);
        }
        50% {
          box-shadow:
            0 0 40px var(--accent-glow),
            0 0 60px var(--accent-glow);
        }
      }
      @keyframes notif {
        0% {
          transform: translateX(120%);
          opacity: 0;
        }
        15% {
          transform: translateX(0);
          opacity: 1;
        }
        85% {
          transform: translateX(0);
          opacity: 1;
        }
        100% {
          transform: translateX(120%);
          opacity: 0;
        }
      }
      @keyframes scanLine {
        0% {
          top: 10%;
        }
        100% {
          top: 85%;
        }
      }

      .fade-in {
        animation: fadeIn 0.35s ease forwards;
      }
      .slide-in {
        animation: slideIn 0.3s ease forwards;
      }

      /* Layout */
      .app-shell {
        display: flex;
        min-height: 100vh;
      }

      /* Sidebar */
      .sidebar {
        width: 240px;
        min-height: 100vh;
        background: var(--bg-secondary);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 100;
        transition: transform 0.3s ease;
      }
      .sidebar-logo {
        padding: 24px 20px 20px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo-icon {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        font-weight: 900;
        color: #fff;
        flex-shrink: 0;
      }
      .logo-text {
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.5px;
      }
      .logo-text span {
        color: var(--accent);
      }

      .sidebar-nav {
        flex: 1;
        padding: 16px 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .nav-section-label {
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        color: var(--text-muted);
        padding: 8px 8px 4px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        border: 1px solid transparent;
        position: relative;
      }
      .nav-item:hover {
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .nav-item.active {
        background: rgba(108, 99, 255, 0.15);
        color: var(--accent);
        border-color: rgba(108, 99, 255, 0.3);
      }
      .nav-item .nav-icon {
        font-size: 18px;
        width: 20px;
        text-align: center;
      }
      .nav-badge {
        margin-left: auto;
        background: var(--accent);
        color: #fff;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
        padding: 1px 7px;
        min-width: 20px;
        text-align: center;
      }
      .nav-badge.danger {
        background: var(--danger);
      }

      .sidebar-footer {
        padding: 16px 12px;
        border-top: 1px solid var(--border);
      }
      .user-chip {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        background: var(--bg-card);
        cursor: pointer;
        transition: all 0.2s;
      }
      .user-chip:hover {
        background: var(--bg-card-hover);
      }
      .avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        flex-shrink: 0;
      }
      .user-info {
        flex: 1;
        min-width: 0;
      }
      .user-name {
        font-size: 13px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .user-role {
        font-size: 11px;
        color: var(--text-muted);
      }

      /* Main content */
      .main-content {
        margin-left: 240px;
        flex: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Top bar */
      .topbar {
        height: 64px;
        padding: 0 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        background: var(--bg-secondary);
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .topbar-title {
        font-size: 18px;
        font-weight: 700;
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* Page content */
      .page {
        padding: 28px;
        animation: fadeIn 0.3s ease;
        flex: 1;
      }

      /* Cards */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        transition: all 0.2s;
      }
      .card:hover {
        border-color: var(--border-light);
      }
      .card-sm {
        padding: 16px;
        border-radius: 12px;
      }

      /* Stats grid */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 16px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        align-items: center;
        gap: 16px;
        transition: all 0.2s;
      }
      .stat-card:hover {
        border-color: var(--border-light);
        transform: translateY(-1px);
      }
      .stat-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
      }
      .stat-icon.purple {
        background: rgba(108, 99, 255, 0.15);
      }
      .stat-icon.pink {
        background: rgba(255, 101, 132, 0.15);
      }
      .stat-icon.green {
        background: rgba(67, 217, 173, 0.15);
      }
      .stat-icon.orange {
        background: rgba(255, 179, 71, 0.15);
      }
      .stat-value {
        font-size: 26px;
        font-weight: 800;
        line-height: 1;
      }
      .stat-label {
        font-size: 12px;
        color: var(--text-secondary);
        margin-top: 3px;
      }

      /* Buttons */
      .btn {
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
        font-family: inherit;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        background: var(--accent-hover);
        box-shadow: 0 0 20px var(--accent-glow);
        transform: translateY(-1px);
      }
      .btn-danger {
        background: var(--danger);
        color: #fff;
      }
      .btn-danger:hover {
        background: #ff7a9a;
        box-shadow: 0 0 20px var(--danger-glow);
      }
      .btn-success {
        background: var(--success);
        color: #0a0a0f;
      }
      .btn-success:hover {
        background: #53e9bd;
      }
      .btn-outline {
        background: transparent;
        color: var(--text-primary);
        border: 1px solid var(--border-light);
      }
      .btn-outline:hover {
        background: var(--bg-card-hover);
        border-color: var(--accent);
        color: var(--accent);
      }
      .btn-ghost {
        background: transparent;
        color: var(--text-secondary);
        border: none;
        padding: 8px 12px;
      }
      .btn-ghost:hover {
        color: var(--text-primary);
        background: var(--bg-card);
      }
      .btn-sm {
        padding: 6px 14px;
        font-size: 12px;
        border-radius: 8px;
      }
      .btn-lg {
        padding: 14px 32px;
        font-size: 16px;
        border-radius: 12px;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
      }

      /* Inputs */
      .form-group {
        margin-bottom: 18px;
      }
      .form-label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }
      .form-input {
        width: 100%;
        padding: 11px 14px;
        background: var(--bg-input);
        border: 1px solid var(--border);
        border-radius: 10px;
        color: var(--text-primary);
        font-size: 14px;
        font-family: inherit;
        transition: all 0.2s;
        outline: none;
      }
      .form-input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px var(--accent-glow);
      }
      .form-input::placeholder {
        color: var(--text-muted);
      }
      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }

      /* Table */
      .table-wrap {
        overflow-x: auto;
        border-radius: 12px;
        border: 1px solid var(--border);
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead tr {
        background: var(--bg-input);
      }
      th {
        padding: 12px 16px;
        text-align: left;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        white-space: nowrap;
      }
      td {
        padding: 14px 16px;
        border-top: 1px solid var(--border);
        font-size: 14px;
      }
      tr:hover td {
        background: var(--bg-card-hover);
      }

      /* Badges */
      .badge {
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 12px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 5px;
      }
      .badge-success {
        background: rgba(67, 217, 173, 0.15);
        color: var(--success);
        border: 1px solid rgba(67, 217, 173, 0.3);
      }
      .badge-danger {
        background: rgba(255, 101, 132, 0.15);
        color: var(--danger);
        border: 1px solid rgba(255, 101, 132, 0.3);
      }
      .badge-warning {
        background: rgba(255, 179, 71, 0.15);
        color: var(--warning);
        border: 1px solid rgba(255, 179, 71, 0.3);
      }
      .badge-info {
        background: rgba(108, 99, 255, 0.15);
        color: var(--accent);
        border: 1px solid rgba(108, 99, 255, 0.3);
      }

      /* Modal */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        padding: 20px;
        animation: fadeIn 0.2s ease;
      }
      .modal {
        background: var(--bg-card);
        border: 1px solid var(--border-light);
        border-radius: 20px;
        padding: 28px;
        width: 100%;
        max-width: 480px;
        max-height: 90vh;
        overflow-y: auto;
        animation: fadeIn 0.25s ease;
      }
      .modal-lg {
        max-width: 640px;
      }
      .modal-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }
      .modal-title {
        font-size: 20px;
        font-weight: 700;
      }
      .modal-close {
        background: var(--bg-input);
        border: none;
        color: var(--text-secondary);
        width: 32px;
        height: 32px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      .modal-close:hover {
        background: var(--danger);
        color: #fff;
      }

      /* Landing */
      .landing {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        background-image:
          radial-gradient(
            ellipse at 50% 0%,
            rgba(108, 99, 255, 0.12) 0%,
            transparent 65%
          ),
          radial-gradient(
            ellipse at 100% 100%,
            rgba(255, 101, 132, 0.08) 0%,
            transparent 50%
          );
        padding: 40px 20px;
      }
      .landing-logo {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 16px;
      }
      .landing-logo-icon {
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        box-shadow: 0 0 40px var(--accent-glow);
      }
      .landing-title {
        font-size: 48px;
        font-weight: 900;
        letter-spacing: -2px;
      }
      .landing-title span {
        color: var(--accent);
      }
      .landing-sub {
        color: var(--text-secondary);
        font-size: 17px;
        text-align: center;
        margin-bottom: 48px;
        max-width: 440px;
        line-height: 1.6;
      }
      .landing-cards {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        width: 100%;
        max-width: 540px;
      }
      .landing-card {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 32px 28px;
        cursor: pointer;
        transition: all 0.25s;
        text-align: center;
      }
      .landing-card:hover {
        border-color: var(--accent);
        transform: translateY(-4px);
        box-shadow: 0 20px 60px rgba(108, 99, 255, 0.15);
      }
      .landing-card-icon {
        font-size: 40px;
        margin-bottom: 16px;
      }
      .landing-card-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 6px;
      }
      .landing-card-desc {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.5;
      }

      /* Auth */
      .auth-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        background-image: radial-gradient(
          ellipse at 30% 30%,
          rgba(108, 99, 255, 0.1) 0%,
          transparent 60%
        );
        padding: 20px;
      }
      .auth-card {
        background: var(--bg-card);
        border: 1px solid var(--border-light);
        border-radius: 24px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        animation: fadeIn 0.4s ease;
      }
      .auth-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 32px;
      }
      .auth-title {
        font-size: 26px;
        font-weight: 800;
        margin-bottom: 6px;
      }
      .auth-sub {
        font-size: 14px;
        color: var(--text-secondary);
        margin-bottom: 28px;
      }
      .divider {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 20px 0;
      }
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: var(--border);
      }
      .divider span {
        font-size: 12px;
        color: var(--text-muted);
      }
      .google-btn {
        width: 100%;
        padding: 12px;
        background: var(--bg-input);
        border: 1px solid var(--border-light);
        border-radius: 10px;
        color: var(--text-primary);
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        transition: all 0.2s;
        font-family: inherit;
      }
      .google-btn:hover {
        border-color: var(--accent);
        background: var(--bg-card-hover);
      }

      /* Profile setup */
      .profile-setup {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        padding: 20px;
      }
      .profile-card {
        background: var(--bg-card);
        border: 1px solid var(--border-light);
        border-radius: 24px;
        padding: 44px;
        width: 100%;
        max-width: 460px;
        text-align: center;
      }
      .profile-icon {
        font-size: 56px;
        margin-bottom: 16px;
      }
      .profile-title {
        font-size: 28px;
        font-weight: 800;
        margin-bottom: 8px;
      }
      .profile-sub {
        color: var(--text-secondary);
        font-size: 14px;
        margin-bottom: 32px;
        line-height: 1.6;
      }

      /* QR styles */
      .qr-container {
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 20px;
        padding: 20px;
      }
      .qr-frame {
        background: #fff;
        padding: 20px;
        border-radius: 16px;
        display: inline-flex;
        box-shadow: 0 0 60px var(--accent-glow);
      }
      .qr-svg {
        display: block;
      }
      .qr-info {
        text-align: center;
      }
      .qr-shop-name {
        font-size: 22px;
        font-weight: 800;
      }
      .qr-sub {
        color: var(--text-secondary);
        font-size: 14px;
        margin-top: 6px;
      }

      /* Scanner */
      .scanner-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 28px 20px;
        background: var(--bg-primary);
        background-image: radial-gradient(
          ellipse at 50% 0%,
          rgba(108, 99, 255, 0.1) 0%,
          transparent 60%
        );
      }
      .scanner-frame {
        position: relative;
        width: 260px;
        height: 260px;
        border-radius: 20px;
        overflow: hidden;
        background: var(--bg-card);
        border: 2px solid var(--accent);
        margin: 28px 0;
        box-shadow: 0 0 40px var(--accent-glow);
      }
      .scanner-corner {
        position: absolute;
        width: 28px;
        height: 28px;
        border-color: var(--accent);
        border-style: solid;
        border-width: 0;
        z-index: 2;
      }
      .scanner-corner.tl {
        top: 0;
        left: 0;
        border-top-width: 4px;
        border-left-width: 4px;
        border-radius: 8px 0 0 0;
      }
      .scanner-corner.tr {
        top: 0;
        right: 0;
        border-top-width: 4px;
        border-right-width: 4px;
        border-radius: 0 8px 0 0;
      }
      .scanner-corner.bl {
        bottom: 0;
        left: 0;
        border-bottom-width: 4px;
        border-left-width: 4px;
        border-radius: 0 0 0 8px;

      const DEMO_SHOP = {
        name: "Krishna General Store",

      // ============================================================
      // GLOBAL STATE
      // ============================================================
      const AppCtx = createContext();

      function AppProvider({ children }) {
        const [view, setView] = useState("landing"); // landing | ownerAuth | customerAuth | ownerSetup | ownerDash | customerScan | customerShop | orderSuccess
        const [ownerPage, setOwnerPage] = useState("dashboard"); // dashboard | products | orders | lowstock | billing | qrcode
        const [currentUser, setCurrentUser] = useState(null);
        const [userRole, setUserRole] = useState(null); // owner | customer
        const [shop, setShop] = useState(DEMO_SHOP);
        const [products, setProducts] = useState([]);
        const [orders, setOrders] = useState([]);
        const [cart, setCart] = useState([]);
        const [cartOpen, setCartOpen] = useState(false);
        const [notifications, setNotifications] = useState([]);
        const [lastOrder, setLastOrder] = useState(null);
        const [sidebarOpen, setSidebarOpen] = useState(false);
        const [firebaseReady, setFirebaseReady] = useState(false);

        // 🔹 Load products from Supabase when app starts
        useEffect(() => {
          loadProducts();
        }, []);

        async function loadProducts() {
          const { data, error } = await supabase
            .from("products")
            .select("*")
            .order("name");

          if (error) {
            console.error("Error loading products:", error);
          } else {
            console.log("Products loaded from Supabase ✅");
            setProducts(data);
          }
        }

        // 🔹 restore login session automatically
        useEffect(() => {
          checkSession();
        }, []);

        async function checkSession() {
          const { data } = await supabase.auth.getSession();

          const session = data.session;

          if (session) {
            const user = session.user;

            const userData = {
              uid: user.id,
              email: user.email,
              name: user.email.split("@")[0],
              role: "owner", // we default to owner for now
            };

            setCurrentUser(userData);

            // check if shop exists
            loadShop(user.id);
          }
        }

        async function loadShop(ownerId) {
          const { data, error } = await supabase
            .from("shops")
            .select("*")
            .eq("owner_id", ownerId);

          if (error) {
            console.error("Shop load error:", error);
            setView("ownerSetup");
            return;
          }

          if (data && data.length > 0) {
            setShop(data[0]);
            setView("ownerDash");
          } else {
            setView("ownerSetup");
          }
        }

        const notify = useCallback((title, body, icon = "🔔") => {
          const id = Date.now();
          setNotifications((n) => [...n, { id, title, body, icon }]);
          setTimeout(
            () => setNotifications((n) => n.filter((x) => x.id !== id)),
            3600,
          );
        }, []);

        const addToCart = (product) => {
          setCart((prev) => {
            const ex = prev.find((x) => x.id === product.id);
            if (ex)
              return prev.map((x) =>
                x.id === product.id ? { ...x, qty: x.qty + 1 } : x,
              );
            return [...prev, { ...product, qty: 1 }];
          });
        };

        const removeFromCart = (id) =>
          setCart((prev) => prev.filter((x) => x.id !== id));
        const updateCartQty = (id, qty) => {
          if (qty < 1) return removeFromCart(id);
          setCart((prev) => prev.map((x) => (x.id === id ? { ...x, qty } : x)));
        };

        const placeOrder = async () => {
          if (!cart.length) return;

          const orderData = {
            customer_name: currentUser?.name || "Customer",
            total: cart.reduce((s, x) => s + x.price * x.qty, 0),
            status: "pending",
          };

          // 1️⃣ Insert order
          const { data: orderInsert, error: orderError } = await supabase
            .from("orders")
            .insert([orderData])
            .select();

          if (orderError) {
            console.error("Order insert error:", orderError);
            notify("Order failed", "Could not save order", "❌");
            return;
          }

          const orderId = orderInsert[0].id;

          // 2️⃣ Insert order items
          const itemsPayload = cart.map((c) => ({
            order_id: orderId,
            product_name: c.name,
            qty: c.qty,
            price: c.price,
          }));

          const { error: itemsError } = await supabase
            .from("order_items")
            .insert(itemsPayload);

          if (itemsError) {
            console.error("Order items error:", itemsError);
          }

          // 3️⃣ Update stock (parallel + safe)
          await Promise.all(
            cart.map((item) =>
              supabase
                .from("products")
                .update({
                  stock: Math.max(0, item.stock - item.qty),
                })
                .eq("id", item.id),
            ),
          );

          // 4️⃣ Refresh products from DB
          loadProducts();

          // 5️⃣ Update UI state
          const newOrder = {
            id: orderId,
            customerName: orderData.customer_name,
            items: cart,
            total: orderData.total,
            status: "pending",
            time: Date.now(),
          };

          setOrders((prev) => [newOrder, ...prev]);
          setLastOrder(newOrder);
          setCart([]);
          setCartOpen(false);
          setView("orderSuccess");

          notify("Order Placed! 🛍️", "Order saved successfully.", "✅");
        };

        const completeOrder = (orderId) => {
          setOrders((prev) =>
            prev.map((o) =>
              o.id === orderId ? { ...o, status: "completed" } : o,
            ),

      // ============================================================
      // QR CODE GENERATOR (pure SVG, no external lib needed)
      // ============================================================
      function generateQRMatrix(text) {
        // Simple QR-like visual using the text hash — for production use a real QR lib
        const size = 21;
        const seed = text.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
        const matrix = [];
        for (let r = 0; r < size; r++) {
          matrix[r] = [];
          for (let c = 0; c < size; c++) {
            // Finder patterns (corners)
            const inFinder =
              (r < 7 && c < 7) ||
              (r < 7 && c >= size - 7) ||
              (r >= size - 7 && c < 7);
            if (inFinder) {
              const rr = r < 7 ? r : r - (size - 7);
              const cc = c < 7 ? c : c - (size - 7);
              const isOuter = rr === 0 || rr === 6 || cc === 0 || cc === 6;
              const isInner = rr >= 2 && rr <= 4 && cc >= 2 && cc <= 4;
              matrix[r][c] = isOuter || isInner ? 1 : 0;
            } else {
              const hash = (seed * (r + 1) * 31 + (c + 1) * 17 + r * c) % 100;
              matrix[r][c] = hash < 50 ? 1 : 0;
            }
          }
        }
        return matrix;
      }

      function QRCode({ value, size = 200 }) {
        const matrix = generateQRMatrix(value);
        const n = matrix.length;
        const cell = size / n;
        return (
          <svg
            width={size}
            height={size}
            viewBox={`0 0 ${size} ${size}`}
            className="qr-svg"
          >
            <rect width={size} height={size} fill="white" />
            {matrix.map((row, r) =>
              row.map((val, c) =>
                val ? (
                  <rect
                    key={`${r}-${c}`}
                    x={c * cell}
                    y={r * cell}
                    width={cell}
                    height={cell}
                    fill="#111118"
                  />
                ) : null,
              ),
            )}
          </svg>
        );
      }

      function LowStockPage() {
        const { lowStockProducts, updateProduct, notify } = useContext(AppCtx);
        const [restockAmts, setRestockAmts] = useState({});

        const handleRestock = (p) => {
          const amt = parseInt(restockAmts[p.id] || 0);
          if (!amt) return;
          updateProduct(p.id, { stock: p.stock + amt });
          setRestockAmts((prev) => ({ ...prev, [p.id]: "" }));
          notify(
            "Stock Updated! 📦",
            `${p.name} restocked by ${amt} ${p.unit}`,
            "✅",
          );
        };

        return (
          <div className="page fade-in">
            <div
              style={{
                display: "flex",
                alignItems: "center",

                marginBottom: 24,
              }}

              <div style={{ fontSize: 20, fontWeight: 800 }}>⚠️ Low Stock</div>
              <span className="badge badge-warning">
                {lowStockProducts.length} items
              </span>

            {lowStockProducts.length === 0 ? (
              <div className="empty-state">
                <div className="empty-state-icon">✅</div>

              </div>

              <div className="table-wrap">
                <table>
                  <thead>
                    <tr>
                      <th>Product</th>
                      <th>Category</th>
                      <th>Current Stock</th>
                      <th>Status</th>
                      <th>Restock</th>

                      <tr key={p.id} className="low-stock-row">

                        <td>
                          <span className="badge badge-info">{p.category}</span>

                            color:

                          {p.stock} {p.unit}

                        <td>
                          <span
                            className={`badge ${p.stock === 0 ? "badge-danger" : "badge-warning"}`}

                        <td>

        const [stockSearch, setStockSearch] = useState("");

            by: "Billing",
          },
          {
            id: 4,
            product: "Sugar",
            change: "-5 kg",
            reason: "Walk-in sale BILL0002",
            time: Date.now() - 3600000 * 5,
            by: "Billing",
          },
        ]);

        // Suggestions for search
        const suggestions =
          search.length > 1
            ? products
                .filter(
                  (p) =>
                    p.name.toLowerCase().includes(search.toLowerCase()) &&
                    p.stock > 0,
                )
                .slice(0, 8)
            : [];

        const addItem = (p) => {
          setItems((prev) => {
            const ex = prev.find((x) => x.id === p.id);
            if (ex)
              return prev.map((x) =>
                x.id === p.id ? { ...x, qty: x.qty + 1 } : x,
              );
            return [...prev, { ...p, qty: 1, customPrice: p.price }];
          });
          setSearch("");
          setShowDropdown(false);
        };

        const updateQty = (id, val) => {
          const v = parseInt(val) || 0;
          if (v < 1) {
            setItems((prev) => prev.filter((x) => x.id !== id));
            return;
          }
          const prod = products.find((p) => p.id === id);
          if (prod && v > prod.stock) {
            notify(
              "⚠️ Stock Limit",
              `Only ${prod.stock} ${prod.unit} available`,
              "⚠️",
            );
            return;
          }
          setItems((prev) =>
            prev.map((x) => (x.id === id ? { ...x, qty: v } : x)),
          );
        };

        const updateCustomPrice = (id, val) => {
          setItems((prev) =>
            prev.map((x) =>
              x.id === id ? { ...x, customPrice: parseFloat(val) || 0 } : x,
            ),
          );
        };

        const subtotal = items.reduce((s, i) => s + i.customPrice * i.qty, 0);
        const discountAmt = discount
          ? discountType === "%"
            ? Math.round((subtotal * parseFloat(discount)) / 100)
            : Math.min(parseFloat(discount) || 0, subtotal)
          : 0;
        const total = subtotal - discountAmt;

        const generateBill = () => {
          if (!items.length) {
            notify("Empty Bill", "Add at least one product", "⚠️");
            return;

          const bill = {
            id: "BILL" + Date.now().toString().slice(-4).padStart(4, "0"),
            customerName: customerName || "Walk-in Customer",
            customerPhone,
            items: items.map((i) => ({
              name: i.name,
              qty: i.qty,
              price: i.customPrice,
              unit: i.unit,
              productId: i.id,
            })),
            subtotal,
            discount: parseFloat(discount) || 0,
            discountType,
            discountAmt,
            total,
            paymentMode,
            time: Date.now(),
            note,
          };
          // Deduct stock
          items.forEach((item) => {
            const p = products.find((p) => p.id === item.id);
            if (p)
              updateProduct(p.id, { stock: Math.max(0, p.stock - item.qty) });
          });
          setBillHistory((prev) => [bill, ...prev]);
          setLastBill(bill);
          setShowBillReceipt(true);
          notify(
            "Bill Generated! 🧾",

          notify(

            `${p.name}: ${mode === "add" ? `+${val}` : `set to ${val}`} ${p.unit}`,

      function CustomerScan() {

        const [scanning, setScanning] = useState(false);

        const simulateScan = () => {
          setScanning(true);
          setTimeout(() => {
            setScanning(false);
            notify("Shop Found! 🏪", `Connected to ${shop.name}`, "✅");
            setView("customerShop");
          }, 2200);
        };

        return (
          <div className="scanner-page fade-in">
            <div style={{ textAlign: "center", marginBottom: 8 }}>

              <div className="scanner-corner tr"></div>
              <div className="scanner-corner bl"></div>
              <div className="scanner-corner br"></div>
              {scanning && <div className="scanner-line"></div>}
              <div className="scanner-inner">
                {scanning ? (
                  <>

      // ============================================================
      // CUSTOMER SHOP PAGE
      // ============================================================
      function CustomerShop() {
        const {
          products,
          shop,
          addToCart,
          cart,
          cartOpen,
          setCartOpen,
          cartCount,
          cartTotal,
          updateCartQty,
          removeFromCart,
          placeOrder,
          setView,
        } = useContext(AppCtx);
        const [search, setSearch] = useState("");
        const [category, setCategory] = useState("All");

        const categories = ["All", ...new Set(products.map((p) => p.category))];
        const filtered = products.filter((p) => {
          const matchCat = category === "All" || p.category === category;
          const matchSearch =
            !search || p.name.toLowerCase().includes(search.toLowerCase());
          return matchCat && matchSearch;
        });

        const getCartQty = (id) => cart.find((c) => c.id === id)?.qty || 0;

        return (
          <div
            style={{
              minHeight: "100vh",
              background: "var(--bg-primary)",
              paddingBottom: 100,
            }}
          >
            {/* Header */}
            <div
              style={{
                background: "var(--bg-secondary)",
                borderBottom: "1px solid var(--border)",
                padding: "16px 20px",
                position: "sticky",
                top: 0,
                zIndex: 100,
              }}
            >
              <div
                style={{
                  display: "flex",
                  alignItems: "center",
                  justifyContent: "space-between",
                  maxWidth: 1100,
                  margin: "0 auto",
                }}
              >
                <div>
                  <div style={{ fontSize: 18, fontWeight: 800 }}>
                    {shop.name}
                  </div>
                  <div style={{ fontSize: 12, color: "var(--text-secondary)" }}>
                    📍 Kirana Shop
                  </div>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div className="search-bar" style={{ maxWidth: 240 }}>
                    <span className="search-icon">🔍</span>
                    <input
                      className="search-input"
                      placeholder="Search..."
                      value={search}
                      onChange={(e) => setSearch(e.target.value)}
                    />
                  </div>
                  <div style={{ position: "relative" }}>
                    <button
                      className="cart-fab"
                      style={{
                        position: "relative",
                        width: 44,
                        height: 44,
                        fontSize: 18,
                      }}
                      onClick={() => setCartOpen(true)}
                    >
                      🛒
                      {cartCount > 0 && (
                        <span className="cart-count-badge">{cartCount}</span>
                      )}
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div
              style={{ maxWidth: 1100, margin: "0 auto", padding: "20px 20px" }}
            >
              {/* Category filter */}
              <div className="cat-filters">
                {categories.map((c) => (
                  <button
                    key={c}
                    className={`cat-btn ${category === c ? "active" : ""}`}
                    onClick={() => setCategory(c)}
                  >
                    {c}
                  </button>
                ))}
              </div>

              {/* Products */}
              <div className="products-grid">
                {filtered.map((p) => {
                  const qty = getCartQty(p.id);
                  const stockPct = Math.min(100, (p.stock / 60) * 100);
                  return (
                    <div key={p.id} className="product-card fade-in">
                      <div className="product-header">
                        <div>
                          <div className="product-name">{p.name}</div>
                          <div className="product-category">{p.category}</div>
                        </div>
                        <span
                          className={`badge ${p.stock === 0 ? "badge-danger" : p.stock <= 10 ? "badge-warning" : "badge-success"}`}
                          style={{ flexShrink: 0 }}
                        >
                          {p.stock === 0
                            ? "Out"
                            : p.stock <= 10
                              ? "Low"
                              : "In Stock"}
                        </span>
                      </div>

                      <div>
                        <div
                          style={{
                            display: "flex",
                            justifyContent: "space-between",
                            fontSize: 12,
                            color: "var(--text-muted)",
                            marginBottom: 5,
                          }}
                        >
                          <span>Stock</span>
                          <span>
                            {p.stock} {p.unit}
                          </span>
                        </div>
                        <div className="product-stock-bar">
                          <div
                            className="product-stock-fill"
                            style={{
                              width: `${stockPct}%`,
                              background:
                                p.stock === 0
                                  ? "var(--danger)"
                                  : p.stock <= 10
                                    ? "var(--warning)"
                                    : "var(--success)",
                            }}
                          ></div>
                        </div>
                      </div>

                      <div
                        style={{
                          display: "flex",
                          alignItems: "center",
                          justifyContent: "space-between",
                        }}
                      >
                        <div className="product-price">
                          ₹{p.price}
                          <small>/{p.unit}</small>
                        </div>
                        {p.stock === 0 ? (
                          <span
                            style={{ fontSize: 13, color: "var(--text-muted)" }}
                          >
                            Unavailable
                          </span>
                        ) : qty === 0 ? (
                          <button
                            className="btn btn-primary btn-sm"
                            onClick={() => addToCart(p)}
                          >
                            + Add
                          </button>
                        ) : (
                          <div className="qty-control">
                            <button
                              className="qty-btn"
                              onClick={() => updateCartQty(p.id, qty - 1)}
                            >
                              −
                            </button>
                            <span className="qty-value">{qty}</span>
                            <button
                              className="qty-btn"
                              onClick={() => updateCartQty(p.id, qty + 1)}
                            >
                              +
                            </button>
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            <div className={`cart-panel ${cartOpen ? "open" : ""}`}>
              <div className="cart-header">
                <div className="cart-title">🛒 Your Cart</div>
                <button
                  className="modal-close"
                  onClick={() => setCartOpen(false)}
                >
                  ✕
                </button>
              </div>
              <div className="cart-body">
                {cart.length === 0 ? (
                  <div className="empty-state">
                    <div className="empty-state-icon">🛒</div>
                    <div className="empty-state-title">Cart is empty</div>
                    <div className="empty-state-sub">
                      Add products to get started
                    </div>
                  </div>
                ) : (
                  cart.map((item) => (
                    <div key={item.id} className="cart-item">
                      <div className="cart-item-name">{item.name}</div>
                      <div className="cart-item-row">
                        <div className="qty-control">
                          <button
                            className="qty-btn"
                            onClick={() => updateCartQty(item.id, item.qty - 1)}
                          >
                            −
                          </button>
                          <span className="qty-value">{item.qty}</span>
                          <button
                            className="qty-btn"
                            onClick={() => updateCartQty(item.id, item.qty + 1)}
                          >
                            +
                          </button>
                        </div>
                        <div className="cart-item-price">
                          ₹{item.price * item.qty}
                        </div>
                      </div>
                    </div>
                  ))
                )}
              </div>
              {cart.length > 0 && (
                <div className="cart-footer">
                  <div className="cart-total-row">
                    <div className="cart-total-label">Total Amount</div>
                    <div className="cart-total-value">₹{cartTotal}</div>
                  </div>
                  <div
                    style={{
                      background: "rgba(67,217,173,0.1)",
                      border: "1px solid rgba(67,217,173,0.2)",
                      borderRadius: 10,
                      padding: "10px 14px",
                      marginBottom: 16,
                      fontSize: 13,
                      color: "var(--success)",
                    }}
                  >
                    30% advance: ₹{Math.round(cartTotal * 0.3)}
                  </div>
                  <button
                    className="btn btn-primary"
                    style={{ width: "100%", justifyContent: "center" }}
                    onClick={placeOrder}
                  >
                    Place Order 🎉
                  </button>
                </div>
              )}
            </div>

            {/* Cart backdrop */}
            {cartOpen && (
              <div
                style={{
                  position: "fixed",
                  inset: 0,
                  background: "rgba(0,0,0,0.5)",
                  zIndex: 199,
                }}
                onClick={() => setCartOpen(false)}
              ></div>
            )}
          </div>
        );
      }

      // ============================================================
      // ORDER SUCCESS PAGE
      // ============================================================
      function OrderSuccessPage() {
        const { lastOrder, setView, shop } = useContext(AppCtx);

        return (
          <div className="auth-page">
            <div
              className="auth-card"
              style={{ maxWidth: 480, textAlign: "center" }}
            >
              <div className="order-success">
                <div className="order-success-icon">🎉</div>
                <div className="order-success-title">Order Placed!</div>
                <div className="order-success-sub">
                  Your order #{lastOrder?.id} has been placed at{" "}
                  <strong>{shop?.name}</strong>. The owner has been notified and
                  will prepare it shortly.
                </div>
                {lastOrder && (
                  <div
                    style={{
                      background: "var(--bg-input)",
                      borderRadius: 14,
                      padding: 20,
                      marginBottom: 24,
                      textAlign: "left",
                    }}
                  >
                    {lastOrder.items.map((it, i) => (
                      <div
                        key={i}
                        style={{
                          display: "flex",
                          justifyContent: "space-between",
                          padding: "6px 0",
                          borderBottom: "1px solid var(--border)",
                          fontSize: 14,
                        }}
                      >
                        <span>
                          {it.name} ×{it.qty}
                        </span>
                        <span>₹{it.price * it.qty}</span>
                      </div>
                    ))}
                    <div
                      style={{
                        display: "flex",
                        justifyContent: "space-between",
                        padding: "12px 0 4px",
                        fontWeight: 800,
                      }}
                    >
                      <span>Total</span>
                      <span style={{ color: "var(--accent)" }}>
                        ₹{lastOrder.total}
                      </span>
                    </div>
                    <div
                      style={{
                        fontSize: 13,
                        color: "var(--success)",
                        textAlign: "center",
                        marginTop: 8,
                      }}
                    >
                      30% advance: ₹{Math.round(lastOrder.total * 0.3)} — pay at
                      pickup
                    </div>
                  </div>
                )}
                <div
                  style={{
                    background: "rgba(108,99,255,0.1)",
                    border: "1px solid rgba(108,99,255,0.3)",
                    borderRadius: 12,
                    padding: "14px",
                    marginBottom: 24,
                    fontSize: 14,
                    color: "var(--accent)",
                  }}
                >
                  📲 You'll be notified when your order is ready for pickup!
                </div>
                <button
                  className="btn btn-primary btn-lg"
                  style={{ width: "100%", justifyContent: "center" }}
                  onClick={() => setView("customerShop")}
                >
                  Continue Shopping
                </button>
                <button
                  className="btn btn-ghost"
                  style={{
                    width: "100%",
                    justifyContent: "center",
                    marginTop: 10,
                  }}
                  onClick={() => setView("landing")}
                >
                  Back to Home
                </button>
              </div>
            </div>
          </div>
        );
      }

      // ============================================================
      // FIREBASE SETUP NOTICE
      // ============================================================
      function FirebaseNotice({ onDismiss }) {
        return (
          <div className="modal-overlay">
            <div className="modal modal-lg">
              <div className="modal-header">
                <div className="modal-title">🔥 Firebase Setup Required</div>
                <button className="modal-close" onClick={onDismiss}>
                  ✕
                </button>
              </div>
              <p
                style={{
                  color: "var(--text-secondary)",
                  fontSize: 14,
                  lineHeight: 1.7,
                  marginBottom: 20,
                }}
              >
                Stockify is built to use{" "}
                <strong style={{ color: "var(--text-primary)" }}>
                  Firebase
                </strong>{" "}
                for real-time sync, authentication, and data storage. To enable
                the full backend, replace the config at the top of the file with
                your Firebase project credentials.
              </p>
              <div
                style={{
                  background: "var(--bg-input)",
                  borderRadius: 12,
                  padding: 20,
                  fontFamily: "monospace",
                  fontSize: 13,
                  color: "var(--accent3)",
                  marginBottom: 20,
                  lineHeight: 1.8,
                }}
              >
                {`const FIREBASE_CONFIG = {`}
                <br />
                {`  apiKey: "YOUR_API_KEY",`}
                <br />
                {`  authDomain: "YOUR_PROJECT.firebaseapp.com",`}
                <br />
                {`  projectId: "YOUR_PROJECT_ID",`}
                <br />
                {`  ...`}
                <br />
                {`};`}
              </div>
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontWeight: 700, marginBottom: 12 }}>
                  Steps to set up Firebase:
                </div>
                {[
                  "Go to console.firebase.google.com and create a project",
                  "Enable Authentication → Email/Password + Google",
                  "Create a Firestore database in production mode",
                  "Go to Project Settings → Web App → copy the config",
                  "Replace FIREBASE_CONFIG in this file with your config",
                ].map((s, i) => (
                  <div
                    key={i}
                    style={{
                      display: "flex",
                      gap: 12,
                      padding: "8px 0",
                      borderBottom: "1px solid var(--border)",
                      fontSize: 14,
                    }}
                  >
                    <span
                      style={{
                        color: "var(--accent)",
                        fontWeight: 700,
                        minWidth: 20,
                      }}
                    >
                      {i + 1}.
                    </span>
                    <span>{s}</span>
                  </div>
                ))}
              </div>
              <button
                className="btn btn-primary"
                style={{ width: "100%", justifyContent: "center" }}
                onClick={onDismiss}
              >
                Continue with Demo Mode →
              </button>
            </div>
          </div>
        );
      }

      // ============================================================
      // APP ROOT
      // ============================================================
      function App() {
        const { view, userRole } = useContext(AppCtx);
        const [showFirebaseNotice, setShowFirebaseNotice] = useState(false);

        return (
          <>
            <NotifToasts />
            {showFirebaseNotice && (
              <FirebaseNotice onDismiss={() => setShowFirebaseNotice(false)} />
            )}
            {view === "landing" && <LandingPage />}
            {view === "ownerAuth" && <AuthPage role="owner" />}
            {view === "customerAuth" && <AuthPage role="customer" />}
            {view === "ownerSetup" && <OwnerSetupPage />}
            {view === "ownerDash" && <OwnerDashboard />}
            {view === "customerScan" && <CustomerScan />}
            {view === "customerShop" && <CustomerShop />}
            {view === "orderSuccess" && <OrderSuccessPage />}
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(
        <AppProvider>
          <App />
        </AppProvider>,
      );
    </script>
  </body>
</html>
